<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Талант & Мадина — Приглашение</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f9f7f4;
      --text: #2d2d2d;
      --accent: #b88c55;
      --card-bg: rgba(255, 255, 255, 0.8);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    .noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; opacity: 0.04; pointer-events: none;
      background-image: url('https://www.transparenttextures.com/patterns/felt.png');
    }

    /* --- ИНТРО И ЛОАДЕР --- */
    #introOverlay {
      position: fixed; inset: 0; z-index: 9999; background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: background 1.5s ease; /* Для плавного перехода фона */
    }
    
    /* Элегантный спиннер загрузки */
    #loader {
      position: absolute;
      width: 40px; height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 10000;
      transition: opacity 0.5s ease;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    #introVideo { 
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 1.5s ease-in-out; /* Плавное затухание видео */
    }
    
    /* Классы для анимации исчезновения */
    .fade-out-video { opacity: 0 !important; }
    .fade-out-overlay { opacity: 0 !important; pointer-events: none; }

    /* --- КОНТЕНТ САЙТА --- */
    #siteContent {
      position: relative; z-index: 2; opacity: 0; transform: translateY(30px);
      transition: all 1.5s ease; max-width: 700px; margin: 0 auto; padding: 60px 20px;
    }
    #siteContent.visible { opacity: 1; transform: translateY(0); }

    .hero { text-align: center; margin-bottom: 50px; }
    .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; display: block; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 10vw, 72px); margin: 0; font-weight: 400; font-style: italic; }
    .lead { font-size: 18px; font-weight: 300; margin-top: 20px; opacity: 0.8; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
    .info-item { background: var(--card-bg); border: 1px solid rgba(184, 140, 85, 0.2); padding: 25px; text-align: center; }
    .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.6; }
    .info-value { font-family: 'Playfair Display', serif; font-size: 20px; }

    .timer-wrap { margin: 60px 0; text-align: center; }
    .timer { display: flex; justify-content: center; gap: 15px; }
    .timer-box { width: 80px; }
    .timer-num { font-family: 'Playfair Display', serif; font-size: 32px; display: block; border-bottom: 1px solid var(--accent); }
    .timer-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; display: block; opacity: 0.6; }

    .form-card {
      background: #fff; padding: 40px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    }
    .form-card h3 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 30px; margin-top: 0; }
    
    .btn {
      display: inline-block; width: 100%; background: var(--text); color: #fff; 
      padding: 20px; font-family: inherit; font-size: 14px; text-decoration: none;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: var(--accent); }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      h1 { font-size: 48px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div id="introOverlay">
    <div id="loader"></div>
    <video id="introVideo" autoplay muted playsinline>
      <source src="intro.mp4" type="video/mp4" />
    </video>
  </div>

  <main id="siteContent">
    <section class="hero">
      <span class="eyebrow">Wedding Invitation</span>
      <h1>Талант & Мадина</h1>
      <p class="lead">Рады пригласить вас на наше торжество</p>
    </section>

    <section class="info-grid">
      <div class="info-item"><div class="info-label">Дата</div><div class="info-value">15 августа 2026</div></div>
      <div class="info-item"><div class="info-label">Время</div><div class="info-value">17:00</div></div>
      <div class="info-item"><div class="info-label">Место</div><div class="info-value">Saltanat Hall</div></div>
      <div class="info-item"><div class="info-label">Город</div><div class="info-value">Астана</div></div>
    </section>

    <section class="timer-wrap">
      <div class="timer">
        <div class="timer-box"><span class="timer-num" id="days">00</span><span class="timer-label">Дней</span></div>
        <div class="timer-box"><span class="timer-num" id="hours">00</span><span class="timer-label">Часов</span></div>
        <div class="timer-box"><span class="timer-num" id="mins">00</span><span class="timer-label">Мин</span></div>
        <div class="timer-box"><span class="timer-num" id="secs">00</span><span class="timer-label">Сек</span></div>
      </div>
    </section>

    <div class="form-card">
      <h3>Ждем вашего ответа</h3>
      <a href="https://tally.so/r/gDZB0P" class="btn">Заполнить анкету</a>
    </div>
  </main>

  <script>
    const DEADLINE_ISO = '2026-08-10T23:59:00+05:00'; 

    function runIntro() {
      const video = document.getElementById('introVideo');
      const overlay = document.getElementById('introOverlay');
      const site = document.getElementById('siteContent');
      const loader = document.getElementById('loader');
      let isTransitioned = false;

      // Скрываем лоадер, как только видео реально начало воспроизводиться
      video.addEventListener('playing', () => {
        loader.style.opacity = '0';
      });

      // Показываем лоадер, если видео остановилось для буферизации
      video.addEventListener('waiting', () => {
        loader.style.opacity = '1';
      });

      const showSite = () => {
        if (isTransitioned) return;
        isTransitioned = true;

        // 1. Плавно высветляем фон под видео
        overlay.style.background = '#f9f7f4'; 
        // 2. Плавно растворяем само видео
        video.classList.add('fade-out-video');
        loader.style.opacity = '0';

        // 3. Через 1 секунду (когда видео почти исчезло) убираем оверлей и показываем сайт
        setTimeout(() => {
          overlay.classList.add('fade-out-overlay');
          site.classList.add('visible');
        }, 1000); 
        
        // 4. Полностью удаляем видео из памяти браузера через 2.5 сек (чтобы не грузило телефон)
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 2500);
      };

      // Пробуем запустить видео
      if (video) {
        video.play().catch(() => console.warn("Автоплей заблокирован"));
        video.onended = showSite;
        video.onerror = showSite;
      }

      // Страховка на 5 секунд (если видео зависло или не может запуститься)
      setTimeout(() => {
        if (!isTransitioned) showSite();
      }, 5000);
    }
    
    runIntro();

    // Таймер
    function updateTimer() {
      const diff = new Date(DEADLINE_ISO) - new Date();
      if (diff <= 0) return; // Можно добавить логику скрытия кнопки, если дата прошла
      
      const d = document.getElementById('days'),
            h = document.getElementById('hours'),
            m = document.getElementById('mins'),
            s = document.getElementById('secs');
      
      if (d) d.textContent = Math.floor(diff / 86400000).toString().padStart(2, '0');
      if (h) h.textContent = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
      if (m) m.textContent = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
      if (s) s.textContent = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
    }
    
    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
