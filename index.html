<!DOCTYPE html>
<html lang="kz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Талант & Мадина — Шақыру</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f9f7f4;
      --text: #2d2d2d;
      --accent: #b88c55;
      --card-bg: rgba(255, 255, 255, 0.8);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    .noise {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; opacity: 0.04; pointer-events: none;
      background-image: url('https://www.transparenttextures.com/patterns/felt.png');
    }

    /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ --- */
    .lang-switcher {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      display: flex; gap: 15px; font-size: 12px; font-weight: 600;
      letter-spacing: 2px; opacity: 0; transition: opacity 1.5s ease;
    }
    .lang-switcher.visible { opacity: 1; }
    
    .lang-btn { color: var(--text); cursor: pointer; opacity: 0.5; transition: opacity 0.3s, color 0.3s; }
    .lang-btn:hover { opacity: 0.8; }
    .lang-btn.active { opacity: 1; color: var(--accent); }

    /* --- ИНТРО И ЛОАДЕР --- */
    #introOverlay {
      position: fixed; inset: 0; z-index: 9999; background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: background 1.5s ease;
    }
    
    #loader {
      position: absolute; width: 40px; height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 1s linear infinite; z-index: 10000; transition: opacity 0.5s ease;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    #introVideo { width: 100%; height: 100%; object-fit: cover; transition: opacity 1.5s ease-in-out; }
    .fade-out-video { opacity: 0 !important; }
    .fade-out-overlay { opacity: 0 !important; pointer-events: none; }

    /* --- КОНТЕНТ САЙТА --- */
    #siteContent {
      position: relative; z-index: 2; opacity: 0; transform: translateY(30px);
      transition: all 1.5s ease; max-width: 700px; margin: 0 auto; padding: 80px 20px 60px;
    }
    #siteContent.visible { opacity: 1; transform: translateY(0); }

    .hero { text-align: center; margin-bottom: 40px; }
    .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 20px; display: block; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 10vw, 72px); margin: 0; font-weight: 400; font-style: italic; }
    .lead { font-size: 18px; font-weight: 300; margin-top: 20px; opacity: 0.8; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0 20px; }
    .info-item { background: var(--card-bg); border: 1px solid rgba(184, 140, 85, 0.2); padding: 25px; text-align: center; }
    .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.6; }
    .info-value { font-family: 'Playfair Display', serif; font-size: 20px; }

    /* --- КНОПКИ КАРТ --- */
    .maps-container {
      display: flex; justify-content: center; gap: 15px; margin-bottom: 40px;
    }
    .map-btn {
      padding: 10px 25px; border: 1px solid var(--accent); border-radius: 4px;
      text-decoration: none; color: var(--text); font-size: 12px; font-weight: 600;
      letter-spacing: 1px; transition: all 0.3s; background: transparent;
    }
    .map-btn:hover { background: var(--accent); color: #fff; }

    .timer-wrap { margin: 60px 0; text-align: center; }
    .timer { display: flex; justify-content: center; gap: 15px; }
    .timer-box { width: 80px; }
    .timer-num { font-family: 'Playfair Display', serif; font-size: 32px; display: block; border-bottom: 1px solid var(--accent); }
    .timer-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; display: block; opacity: 0.6; }

    .form-card { background: #fff; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
    .form-card h3 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 30px; margin-top: 0; }
    
    .btn {
      display: inline-block; width: 100%; background: var(--text); color: #fff; 
      padding: 20px; font-family: inherit; font-size: 14px; text-decoration: none;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: var(--accent); }

    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } h1 { font-size: 48px; } }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="lang-switcher" id="langSwitcher">
    <span class="lang-btn active" data-lang="kz">KZ</span>
    <span class="lang-btn" data-lang="ru">RU</span>
    <span class="lang-btn" data-lang="en">EN</span>
  </div>

  <div id="introOverlay">
    <div id="loader"></div>
    <video id="introVideo" autoplay muted playsinline>
      <source src="intro.mp4" type="video/mp4" />
    </video>
  </div>

  <main id="siteContent">
    <section class="hero">
      <span class="eyebrow" data-i18n="eyebrow">Үйлену тойына шақыру</span>
      <h1 data-i18n="names">Талант & Мадина</h1>
      <p class="lead" data-i18n="lead">Сіздерді қуанышымызға ортақ болуға шақырамыз</p>
    </section>

    <section class="info-grid">
      <div class="info-item"><div class="info-label" data-i18n="lbl_date">Күні</div><div class="info-value" data-i18n="val_date">26 маусым 2026</div></div>
      <div class="info-item"><div class="info-label" data-i18n="lbl_time">Уақыты</div><div class="info-value" data-i18n="val_time">16:00</div></div>
      <div class="info-item"><div class="info-label" data-i18n="lbl_place">Өтетін орны</div><div class="info-value" data-i18n="val_place">Magauya Grand Hall</div></div>
      <div class="info-item"><div class="info-label" data-i18n="lbl_city">Қала</div><div class="info-value" data-i18n="val_city">Алматы</div></div>
    </section>

    <div class="maps-container">
      <a href="https://2gis.kz/almaty/geo/70000001111187725" target="_blank" class="map-btn">2GIS</a>
      <a href="https://maps.google.com/?q=Magauya+Grand+Hall+Алматы" target="_blank" class="map-btn">Google Maps</a>
    </div>

    <section class="timer-wrap">
      <div class="timer">
        <div class="timer-box"><span class="timer-num" id="days">00</span><span class="timer-label" data-i18n="lbl_days">Күн</span></div>
        <div class="timer-box"><span class="timer-num" id="hours">00</span><span class="timer-label" data-i18n="lbl_hours">Сағат</span></div>
        <div class="timer-box"><span class="timer-num" id="mins">00</span><span class="timer-label" data-i18n="lbl_mins">Мин</span></div>
        <div class="timer-box"><span class="timer-num" id="secs">00</span><span class="timer-label" data-i18n="lbl_secs">Сек</span></div>
      </div>
    </section>

    <div class="form-card">
      <h3 data-i18n="form_title">Жауабыңызды күтеміз</h3>
      <a href="https://tally.so/r/gDZB0P?lang=kz" class="btn" id="tallyBtn" data-i18n="btn_submit">Келемін!</a>
    </div>
  </main>

  <script>
    // --- 1. СЛОВАРЬ ПЕРЕВОДОВ ---
    const translations = {
      kz: {
        eyebrow: "Үйлену тойына шақыру",
        names: "Талант & Мадина",
        lead: "Сіздерді қуанышымызға ортақ болуға шақырамыз",
        lbl_date: "Күні", val_date: "26 маусым 2026",
        lbl_time: "Уақыты", val_time: "16:00",
        lbl_place: "Өтетін орны", val_place: "Magauya Grand Hall",
        lbl_city: "Қала", val_city: "Алматы",
        lbl_days: "Күн", lbl_hours: "Сағат", lbl_mins: "Мин", lbl_secs: "Сек",
        form_title: "Жауабыңызды күтеміз",
        btn_submit: "Келемін!"
      },
      ru: {
        eyebrow: "Приглашение на свадьбу",
        names: "Талант & Мадина",
        lead: "Рады пригласить вас на наше торжество",
        lbl_date: "Дата", val_date: "26 июня 2026",
        lbl_time: "Время", val_time: "16:00",
        lbl_place: "Место", val_place: "Magauya Grand Hall",
        lbl_city: "Город", val_city: "Алматы",
        lbl_days: "Дней", lbl_hours: "Часов", lbl_mins: "Мин", lbl_secs: "Сек",
        form_title: "Ждем вашего ответа",
        btn_submit: "Приду!"
      },
      en: {
        eyebrow: "Wedding Invitation",
        names: "Talant & Madina",
        lead: "We are delighted to invite you to our celebration",
        lbl_date: "Date", val_date: "June 26, 2026",
        lbl_time: "Time", val_time: "4:00 PM",
        lbl_place: "Venue", val_place: "Magauya Grand Hall",
        lbl_city: "City", val_city: "Almaty",
        lbl_days: "Days", lbl_hours: "Hours", lbl_mins: "Mins", lbl_secs: "Secs",
        form_title: "We await your reply",
        btn_submit: "I'll be there!"
      }
    };

    // --- 2. ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ЯЗЫКА ---
    function changeLanguage(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      document.documentElement.lang = lang;

      const tallyBtn = document.getElementById('tallyBtn');
      if (tallyBtn) {
        tallyBtn.href = `https://tally.so/r/gDZB0P?lang=${lang}`;
      }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        changeLanguage(e.target.getAttribute('data-lang'));
      });
    });

    // --- 3. НАСТРОЙКИ (ОБНОВИЛ ДАТУ ДЛЯ ТАЙМЕРА) ---
    // Установил таймер прямо на день свадьбы
    const DEADLINE_ISO = '2026-06-26T16:00:00+05:00'; 

    function runIntro() {
      const video = document.getElementById('introVideo');
      const overlay = document.getElementById('introOverlay');
      const site = document.getElementById('siteContent');
      const loader = document.getElementById('loader');
      const langSwitcher = document.getElementById('langSwitcher');
      let isTransitioned = false;

      if(video) {
        video.addEventListener('playing', () => loader.style.opacity = '0');
        video.addEventListener('waiting', () => loader.style.opacity = '1');
      }

      const showSite = () => {
        if (isTransitioned) return;
        isTransitioned = true;

        overlay.style.background = '#f9f7f4'; 
        if(video) video.classList.add('fade-out-video');
        loader.style.opacity = '0';

        setTimeout(() => {
          overlay.classList.add('fade-out-overlay');
          site.classList.add('visible');
          langSwitcher.classList.add('visible'); 
        }, 1000); 
        
        setTimeout(() => overlay.style.display = 'none', 2500);
      };

      if (video) {
        video.play().catch(() => console.warn("Автоплей заблокирован"));
        video.onended = showSite;
        video.onerror = showSite;
      }

      setTimeout(() => { if (!isTransitioned) showSite(); }, 5000);
    }
    
    runIntro();

    // --- 4. ТАЙМЕР ---
    function updateTimer() {
      const diff = new Date(DEADLINE_ISO) - new Date();
      if (diff <= 0) return; 
      
      const d = document.getElementById('days'), h = document.getElementById('hours'),
            m = document.getElementById('mins'), s = document.getElementById('secs');
      
      if (d) d.textContent = Math.floor(diff / 86400000).toString().padStart(2, '0');
      if (h) h.textContent = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
      if (m) m.textContent = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
      if (s) s.textContent = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
    }
    
    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
